storage:
  url: sqlite:///variant2_tuning.db
  study_prefix: variant2

paths:
  data_path: ../Sarcasm_Headlines_Dataset_With_Metadata.json
  output_root: ../runs/variant2_tuning

slurm:
  default:
    time: "04:00:00"
    cpus_per_task: 4
    mem: 16G
    workers: 1
    job_name_prefix: variant2-tune
  classical:
    gres: null
  transformer:
    partition: gpu-long
    gpus: h100-96
    mem: 32G

studies:
  tfidf_nb_headline_section:
    model: tfidf_nb
    recipe: headline_section
    n_trials: 20
    max_rows: 2000
    fixed:
      split:
        train_size: 0.6
        val_size: 0.2
        test_size: 0.2
        random_state: 42
      run:
        seed: 42
      model:
        lowercase: false
    search_space:
      model:
        ngram_range:
          type: categorical
          choices:
            - [1, 1]
            - [1, 2]
        min_df:
          type: int
          low: 1
          high: 5
        max_df:
          type: float
          low: 0.8
          high: 1.0
        alpha:
          type: logfloat
          low: 0.01
          high: 10.0
      run: {}
      split: {}

  tfidf_nb_headline_section_description:
